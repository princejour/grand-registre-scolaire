<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta http-equiv="cache-control" content="no-store, no-cache, must-revalidate, max-age=0">
  <meta http-equiv="pragma" content="no-cache">
  <meta http-equiv="expires" content="0">
  <title>الدفتر الكبير للغيابات — النسخة الجديدة</title>
  <style>
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#eef3f7;color:#173b5f;font-family:Tahoma,Arial,sans-serif;text-align:center;padding:20px}
    .card{background:#fff;padding:24px;border-radius:16px;box-shadow:0 10px 30px #173b5f22;max-width:420px}
    .spin{width:42px;height:42px;margin:0 auto 14px;border:5px solid #d8e4ec;border-top-color:#173b5f;border-radius:50%;animation:s .8s linear infinite}
    @keyframes s{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <div class="card" id="status"><div class="spin"></div><strong>جاري تحميل النسخة الجديدة...</strong></div>
  <script>
    (async()=>{
      try{
        if('serviceWorker' in navigator){
          const regs=await navigator.serviceWorker.getRegistrations();
          await Promise.all(regs.map(r=>r.unregister()));
        }
        if('caches' in window){
          const keys=await caches.keys();
          await Promise.all(keys.map(k=>caches.delete(k)));
        }
        const url='https://cdn.jsdelivr.net/gh/princejour/grand-registre-scolaire@b31b393636cee6f06fa6fe88fa048ab2f1f1a98d/app-v3.html?fresh=4';
        const response=await fetch(url,{cache:'no-store'});
        if(!response.ok)throw new Error('HTTP '+response.status);
        const html=await response.text();
        document.open();document.write(html);document.close();
      }catch(error){
        document.getElementById('status').innerHTML='<h2>تعذر تحميل النسخة الجديدة</h2><p>أغلق الصفحة وافتح الرابط من جديد بعد دقيقة.</p>';
        console.error(error);
      }
    })();
  </script>
</body>
</html>
