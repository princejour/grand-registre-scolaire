<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta http-equiv="cache-control" content="no-store"><title>الدفتر الكبير للغيابات</title><style>body{margin:0;min-height:100vh;display:grid;place-items:center;background:#eef3f7;color:#173b5f;font-family:Tahoma,Arial,sans-serif;text-align:center}.spin{width:44px;height:44px;border:5px solid #d7e3eb;border-top-color:#173b5f;border-radius:50%;animation:s .8s linear infinite;margin:auto}@keyframes s{to{transform:rotate(360deg)}}</style></head><body><div id="loading"><div class="spin"></div><p>جاري فتح النسخة النهائية...</p></div><script>(async()=>{try{for(const key of ['grand-registre-v3','grand-registre-v2']){const raw=localStorage.getItem(key);if(!raw)continue;const state=JSON.parse(raw);if(Array.isArray(state.classes)){state.classes=state.classes.filter(c=>Array.isArray(c.students)&&c.students.length>0&&c.students.length<=60);localStorage.setItem(key,JSON.stringify(state));}}const r=await fetch('./app-v3.html?release=5',{cache:'no-store'});let h=await r.text();h=h.replace('</body>','<script src="./patch-v4.js?release=5"><\/script></body>');document.open();document.write(h);document.close();}catch(e){document.getElementById('loading').innerHTML='<p>تعذر فتح التطبيق. أعد تحميل الصفحة.</p>';}})();</script></body></html>
