<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#173b5f">
  <title>الدفتر الكبير للغيابات</title>
  <style>body{margin:0;min-height:100vh;display:grid;place-items:center;background:#eef3f7;color:#173b5f;font-family:Tahoma,Arial,sans-serif;text-align:center;padding:20px}.card{background:#fff;padding:24px;border-radius:16px;box-shadow:0 10px 30px #173b5f22}.spin{width:42px;height:42px;margin:0 auto 14px;border:5px solid #d8e4ec;border-top-color:#173b5f;border-radius:50%;animation:s .8s linear infinite}@keyframes s{to{transform:rotate(360deg)}}</style>
</head>
<body>
  <div class="card" id="status"><div class="spin"></div><strong>جاري تحميل النسخة المصححة...</strong></div>
  <script>
    (async()=>{
      const url='https://cdn.jsdelivr.net/gh/princejour/grand-registre-scolaire@b31b393636cee6f06fa6fe88fa048ab2f1f1a98d/app-v3.html';
      try{
        const response=await fetch(url,{cache:'no-store'});
        if(!response.ok)throw new Error('HTTP '+response.status);
        const html=await response.text();
        document.open();document.write(html);document.close();
      }catch(error){
        document.getElementById('status').innerHTML='<h2>تعذر تحميل التطبيق</h2><p>حدّث الصفحة أو افتح الرابط بعد قليل.</p>';
        console.error(error);
      }
    })();
  </script>
</body>
</html>
