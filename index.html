<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta http-equiv="cache-control" content="no-store, no-cache, must-revalidate, max-age=0">
  <meta http-equiv="pragma" content="no-cache">
  <meta http-equiv="expires" content="0">
  <title>الدفتر الكبير للغيابات</title>
  <style>
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#eef3f7;color:#173b5f;font-family:Tahoma,Arial,sans-serif;text-align:center;padding:20px}
    .card{background:#fff;padding:25px;border-radius:16px;box-shadow:0 10px 30px #173b5f22}
    .spin{width:44px;height:44px;margin:0 auto 14px;border:5px solid #d7e3eb;border-top-color:#173b5f;border-radius:50%;animation:s .8s linear infinite}
    @keyframes s{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <div id="loading" class="card"><div class="spin"></div><strong>جاري فتح النسخة النهائية...</strong></div>
  <script>
    (async()=>{
      try{
        if('serviceWorker' in navigator){
          const registrations=await navigator.serviceWorker.getRegistrations();
          await Promise.all(registrations.map(r=>r.unregister()));
        }
        if('caches' in window){
          const keys=await caches.keys();
          await Promise.all(keys.map(k=>caches.delete(k)));
        }
        const response=await fetch('./app-v3.html?release=20260624-4',{cache:'no-store'});
        if(!response.ok)throw new Error('HTTP '+response.status);
        let html=await response.text();
        html=html.replace('</body>','<script src="./patch-v4.js?release=20260624-4"><\/script></body>');
        document.open();
        document.write(html);
        document.close();
      }catch(error){
        document.getElementById('loading').innerHTML='<h2>تعذر فتح التطبيق</h2><p>أعد تحميل الصفحة بعد دقيقة.</p>';
        console.error(error);
      }
    })();
  </script>
</body>
</html>
